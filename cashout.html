<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- daisy ui cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#f4f5f7]">
    <div class="max-w-lg mx-auto bg-white rounded-b-xl">
        <!-- nav bar -->
      <div class="min-h-[50px] flex bg-red justify-between items-center border-b-1 border-gray-400 p-3">
        <div class="flex">
          <img src="projects/assets/Group.png" class="h-[50px]" alt="" />
          <div class="ml-3">
            <h2 class="font-bold">$<span id="available-balance">45000</span></h2>
            <p class="text-[#08080880]">Available Balance</p>
          </div>
        </div>
        <div>
          <button class="text-[#08080880] btn">
            <i
              class="fa-solid fa-arrow-right-from-bracket rotate-180 text-red-700"
            ></i>
            Log Out
          </button>
        </div>
      </div>
<!-- end nav bar -->
      <div class="mt-8 p-3">
        <h1 class="text-2xl font-bold">🔥 Welcome to Payooo!</h1>
        <p class="text-[#08080880]">
          Enjoy easy and convenient financial services with us. Cashout charge
          is low and
        </p>
      </div>
<!-- Features -->
      <div class="min-h-[200px] grid grid-cols-3 gap-4 p-3">
        <div id="add-button" class="border-2 border-gray-300 text-center p-3 rounded-xl">
          <img src="projects/assets/wallet1.png" class="mx-auto" alt="" />
          <h2>Add Money</h2>
        </div>
        <div id="cash-out-button" class="border-2 border-gray-300 text-center p-3 rounded-xl">
          <img src="projects/assets/send1.png" class="mx-auto" alt="" />
          <h2>CashOut</h2>
        </div>
        <div class="border-2 border-gray-300 text-center p-3 rounded-xl">
          <img src="projects/assets/money1.png" class="mx-auto" alt="" />
          <h2>Transfer Money</h2>
        </div>
        <div class="border-2 border-gray-300 text-center p-3 rounded-xl">
          <img src="projects/assets/bonus1.png" class="mx-auto" alt="" />
          <h2>Get Bonus</h2>
        </div>
        <div class="border-2 border-gray-300 text-center p-3 rounded-xl">
          <img src="projects/assets/purse1.png" class="mx-auto" alt="" />
          <h2>Pay Bill</h2>
        </div>
        <div class="form-btn border-2 border-gray-300 text-center p-3 rounded-xl">
          <img src="projects/assets/transaction1.png" class="mx-auto" alt="" />
          <h2>Transactions</h2>
        </div>
      </div>
    </div>

    <div class="all-form-sections max-w-lg mx-auto">    

         <div class="form" id="cash-out-parent" >
          <h1 class="my-5 font-bold">Cash out</h1>
          <form action="" class="bg-white rounded-2xl p-8">
            <div>
                <label class="font-semibold" for="">Agent Number</label>
                <br/>
                <input type="text" placeholder="Enter 11 digit number"  class="input bg-[#f4f5f7] mt-3 rounded-3xl w-full" />
            </div>
            <div class="mt-3">
                <label class="font-semibold" for="">Amount</label>
                <br/>
                <input id="withdraw-amount" type="text" placeholder="Enter Amount to Withdraw"  class="input bg-[#f4f5f7] mt-3 rounded-3xl w-full" />
            </div>
            <div class="mt-3">
                <label class="font-semibold" for="">Pin Number</label>
                <br/>
                <input type="text" placeholder="Enter 4 digit pin number"  class="input bg-[#f4f5f7] mt-3 rounded-3xl w-full" />
            </div>

            <button id="withdraw-btn" class="btn text-white bg-[#0874F2]  mt-5 w-full rounded-3xl" >Withdraw Money</button>
        </form>
        </div>
         

    </div>
       <script src="home.js"></script>
  </body>
</html>
