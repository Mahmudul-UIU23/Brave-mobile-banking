<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brave_Mobile_Banking</title>
    <link rel="stylesheet" href="style.css">
    <!-- tailwin css -->
    
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- daisy ui cdn -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
</head>
<body class="bg-[#F4F5F7] h-[100vh] flex justify-center items-center  flex-col">
    <!-- div er modde  -->
    <div class="h-[130px] w-[300px]   bg-[url(projects/assets/bg.png)] bg-cover flex justify-center items-center"> 
        
        <img src="projects/assets/Group.png" alt="">
    </div>
    <form class=" border-2  border-blue-300 rounded-lg p-6 w-[400px] mx-auto  bg-white padding-6">
         <h1 class="text-2xl font-bold mb-4 text-center">Brave Mobile Banking</h1>
        <div>
            <label for="" class="font-bold text-lg">Mobile Number</label> <br> 
            <input type="text" placeholder="Enter your Mobile Number" class=" w-full input input-neutral bg-[#F4F5F7] mt-4 rounded-3xl" />
        </div>
        <div class="mt-5">
           
            <label for="" class="font-bold text-lg">4 digit pin</label>
             <br>
            <input type="text" placeholder="Enter your pin" class="input input-neutral bg-[#F4F5F7] mt-4 rounded-3xl w-full" />
        </div>
        <!-- typy = button na dile from er submit buttion hisebe kaj korbe tai form -->
        <button type="button" class="btn btn-primary mt-4 w-full rounded-3xl" id="loginButton">Login</button>
    </form>
    
<!-- js file -->
<script src="script.js"></script>
</body>
</html>
